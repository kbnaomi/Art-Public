<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reading List — Art Public</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --ink: #666193;
      --ink-light: #6b6560;
      --accent: #d1a2a9;
      --rule: #d8d2c8;
    }
 
    html { font-size: 18px; scroll-behavior: smooth; }
 
    body {
      background: #000000;
      color: #FFFFFF;
      font-family: 'Trebuchet MS', Georgia, serif;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }
 
    /* ── HEADER ── */
    header {
      padding: 2.5rem 2rem 1.5rem;
      text-align: center;
      position: sticky;
      top: 0;
      background: #000000;
      z-index: 100;
    }
 
    header::after {
      content: '';
      display: block;
      width: 75%;
      margin: 1.5rem auto 0;
      height: 1px;
      background: var(--rule);
    }
 
    .site-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #FFFFFF;
      text-decoration: none;
    }
 
    nav {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
    }
 
    nav a {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.2s;
      font-family: 'Trebuchet MS', Georgia, serif;
    }
 
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--accent); }
 
    /* ── TABLE ── */
    .table-wrapper {
      max-width: 900px;
      margin: 3rem auto 0;
      padding: 0 3rem 6rem;
      animation: fadeIn 0.7s ease 0.1s both;
    }
 
    /* ── BOOK ROW ── */
    .book-row {
      display: grid;
      grid-template-columns: 2rem 1fr 1fr 7rem 6rem;
      gap: 1rem;
      align-items: center;
      padding: 1.25rem 0;
      border-bottom: 1px solid #1a1a1a;
      cursor: default;
      transition: background 0.15s;
    }
 
    .book-row:hover {
      background: #0d0d0d;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
      margin: 0 -0.5rem;
    }
 
    .book-num {
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 0.05em;
    }
 
    .book-title-col {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
 
    .book-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1rem;
      font-weight: 400;
      font-style: italic;
      color: #FFFFFF;
      line-height: 1.3;
    }
 
    /* Reviewed titles get an underline hint on hover */
    a.book-title {
      text-decoration: none;
      color: #FFFFFF;
      transition: color 0.2s;
    }
 
    a.book-title:hover {
      color: var(--accent);
    }
 
    .book-note {
      font-size: 0.78rem;
      color: var(--ink-light);
      font-family: 'EB Garamond', serif;
      font-style: normal;
      line-height: 1.4;
      margin-top: 0.1rem;
    }
 
    .book-author {
      font-family: 'Trebuchet MS', Georgia, serif;
      font-size: 0.92rem;
      color: #aaa;
    }
 
    .book-genre {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }
 
    .book-nationality {
      font-family: 'Trebuchet MS', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
    }
 
    /* ── REVIEWED BADGE ── */
    .reviewed-badge {
      font-family: 'Courier Prime', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.1rem 0.35rem;
      margin-left: 0.5rem;
      vertical-align: middle;
      opacity: 0.7;
    }
 
    /* ── SECTION DIVIDER ── */
    .section-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 2rem 0 0.75rem;
      border-bottom: 1px solid var(--rule);
      margin-top: 1rem;
    }
 
    /* ── FOOTER ── */
    footer {
      padding: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #d1a2a9;
      letter-spacing: 0.05em;
      font-family: 'Trebuchet MS', Georgia, serif;
    }
 
    footer::before {
      content: '';
      display: block;
      width: 75%;
      margin: 0 auto 2rem;
      height: 1px;
      background: var(--rule);
    }
 
    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      header { padding: 1.5rem 1rem 1rem; }
      .site-title { font-size: 1.5rem; }
      nav { gap: 0.5rem 1rem; }
      nav a { font-size: 0.7rem; }
 
      .table-wrapper { padding: 0 1.25rem 4rem; }
 
      .book-row {
        grid-template-columns: 1.5rem 1fr;
        gap: 0.75rem;
      }
 
      .book-author,
      .book-genre,
      .book-nationality { display: none; }
 
      .book-title { font-size: 0.95rem; }
      .book-note { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
 
  <!-- HEADER -->
  <header>
    <a class="site-title" href="index.html">Art Public</a>
    <nav>
      <a href="reading-list.html" class="active">Reading List</a>
      <a href="review.html">Reviews</a>
      <a href="quotes.html">Quotes</a>
      <a href="awards.html">Awards</a>
      <a href="about.html">About</a>
    </nav>
  </header>
 
  <!-- TABLE -->
  <div class="table-wrapper">
 
    <div class="section-label">2026</div>
 
    <div id="book-list"></div>
 
  </div>
 
  <!-- FOOTER -->
  <footer>
    <p>© 2026 Art Public</p>
  </footer>
 
  <script src="reviews.js"></script>
  <script>
    const books = [
      { num: "80", title: "The Master and Margarita", note: "Luke | January",       author: "Mikhail Bulgakov",    genre: "Fiction",                    nationality: "Russian" },
      { num: "81", title: "The Loser",                note: "Naomi | January",      author: "Thomas Bernhard",     genre: "Fiction",                    nationality: "Austrian" },
      { num: "82", title: "Robert E. Lee",            note: "Luke | February",      author: "Allen C Guelzo",      genre: "Non-Fiction | Civil War",     nationality: "American" },
      { num: "83", title: "The Road",                 note: "Naomi | February",     author: "Cormac McCarthy",     genre: "Fiction",                    nationality: "American" },
      { num: "84", title: "Einstein's Dreams",        note: "Luke | March",         author: "Alan Lightman",       genre: "Fiction",                    nationality: "American" },
      { num: "85", title: "The Moon is a Harsh Mistress", note: "Naomi | March",   author: "Robert A. Heinlein",  genre: "Sci-Fi",                     nationality: "American" },
      { num: "86", title: "Neuromancer",              note: "Luke | April",         author: "William Gibson",      genre: "Sci-Fi",                     nationality: "American" },
      { num: "87", title: "Fight Club",               note: "Naomi | April",        author: "Chuck Palahniuk",     genre: "Fiction",                    nationality: "American" },
      { num: "88", title: "Out of the Silent Planet", note: "Luke | May",           author: "C. S. Lewis",         genre: "Fantasy",                    nationality: "British" },
      { num: "89", title: "The Hidden Girl and Other Stories", note: "Naomi | May", author: "Ken Liu",             genre: "Fiction",                    nationality: "Chinese American" },
      { num: "",   title: "Intermission",             note: "June",                 author: "",                    genre: "Intermission",               nationality: "" },
      { num: "90", title: "The Republic",             note: "Luke | July",          author: "Plato",               genre: "Non-fiction | Philosophy",   nationality: "Greek" },
      { num: "91", title: "The Authentic Life of Billy the Kid", note: "Naomi | July", author: "Pat Garrett",     genre: "Non-Fiction",                nationality: "American" },
      { num: "92", title: "Oh God, the Sun Goes",     note: "Luke | August",        author: "David O'Conner",      genre: "Fiction",                    nationality: "American" },
      { num: "93", title: "The Bluest Eye",           note: "Naomi | August",       author: "Toni Morrison",       genre: "Fiction",                    nationality: "American" },
      { num: "94", title: "The Consolation of Philosophy", note: "Luke | September", author: "Boethius",           genre: "Non-Fiction | Philosophy",   nationality: "Roman" },
      { num: "95", title: "Knowing the Score",        note: "Naomi | September",    author: "David Papineau",      genre: "Non-Fiction | Philosophy",   nationality: "British" },
      { num: "96", title: "Jurassic Park",            note: "Luke | October",       author: "Michael Crichton",    genre: "Sci-Fi",                     nationality: "American" },
      { num: "97", title: "The Sheltering Sky",       note: "Luke | October",       author: "Paul Bowles",         genre: "Fiction",                    nationality: "American" },
      { num: "",   title: "Holiday Break",            note: "November | December",  author: "",                    genre: "Holiday Break",              nationality: "" },
    ];
 
    const container = document.getElementById('book-list');
 
    books.forEach(book => {
      const hasReview = REVIEWED_TITLES.has(book.title);
      const titleHTML = hasReview
        ? `<a class="book-title" href="review.html#${titleToId(book.title)}">${book.title}<span class="reviewed-badge">Review</span></a>`
        : `<span class="book-title">${book.title}</span>`;
 
      container.innerHTML += `
        <div class="book-row">
          <span class="book-num">${book.num}</span>
          <div class="book-title-col">
            ${titleHTML}
            <span class="book-note">${book.note}</span>
          </div>
          <span class="book-author">${book.author}</span>
          <span class="book-genre">${book.genre}</span>
          <span class="book-nationality">${book.nationality}</span>
        </div>
      `;
    });
  </script>
 
</body>
</html>
